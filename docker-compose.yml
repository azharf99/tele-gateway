services:
  tele-gateway:
    # build: .
    image: azharfa/tele-gateway:latest
    container_name: tele-gateway
    restart: always
    ports:
      - "8085:8080"
    environment:
      # Telegram API Credentials (will be overridden by .env file)
      - TZ=Asia/Jakarta
      - TELEGRAM_APP_ID=${TELEGRAM_APP_ID}
      - TELEGRAM_APP_HASH=${TELEGRAM_APP_HASH}
      - TELEGRAM_SESSION_FILE=/app/session/session.json
      - PHONE_NUMBER=${PHONE_NUMBER}
      - PASSWORD=${PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - GIN_MODE=${GIN_MODE}

      # Database Configuration (Connect to your gothub_db container)
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}

      - ADMIN_NAME=${ADMIN_NAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}

      # AI Configuration
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./session:/app/session
      - .env:/app/.env
    networks:
      - shared-network
    stdin_open: true # Required for interactive OTP entry
    tty: true # Required for interactive OTP entry

networks:
  shared-network:
    external: true
    name: shared-network
